# Nginx config — graphiquemotion.com (Hetzner CX22)
# Chemin : /etc/nginx/sites-available/graphiquemotion.com

# ── Rate limiting zones ──────────────────────────────────────────────────────
# Zone pour le panel admin : max 5 req/min par IP
limit_req_zone $binary_remote_addr zone=admin_zone:10m rate=5r/m;
# Zone pour l'OAuth : max 10 req/min par IP
limit_req_zone $binary_remote_addr zone=oauth_zone:10m rate=10r/m;

server {
    listen 80;
    server_name graphiquemotion.com www.graphiquemotion.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name graphiquemotion.com www.graphiquemotion.com;

    # Certbot SSL
    ssl_certificate     /etc/letsencrypt/live/graphiquemotion.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/graphiquemotion.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/graphiquemotion/dist;
    index index.html;

    # ── Sécurité headers ────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options "nosniff"                             always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection       "1; mode=block"                       always;

    # ── Bloquer les bots/scanners qui cherchent /admin, /wp-admin, etc. ────
    location ~* ^/(admin|wp-admin|wp-login|phpmyadmin|pma|administrator|login|backend|cms|dashboard|panel|control|manage|cpanel|webmail|xmlrpc\.php) {
        return 404;
    }

    # ── Panel CMS (path secret) ──────────────────────────────────────────────
    location /gm-studio-x7k9 {
        # Rate limiting strict : 5 req/min, burst 3
        limit_req zone=admin_zone burst=3 nodelay;
        limit_req_status 429;

        # Bloquer les user-agents suspects (bots, scanners)
        if ($http_user_agent ~* (sqlmap|nikto|nmap|masscan|zgrab|curl|wget|python-requests|scrapy|go-http|libwww)) {
            return 403;
        }

        # Autoriser uniquement GET (pas de POST direct sur le panel)
        limit_except GET { deny all; }

        try_files $uri $uri/ /gm-studio-x7k9/index.html;
    }

    # ── OAuth proxy ─────────────────────────────────────────────────────────
    location /oauth {
        limit_req zone=oauth_zone burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ── Cache statiques ─────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback ────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
