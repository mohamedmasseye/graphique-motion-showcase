# Nginx config — graphiquemotion.com (Hetzner CX22)
# Chemin : /etc/nginx/sites-available/graphiquemotion.com

server {
    listen 80;
    server_name graphiquemotion.com www.graphiquemotion.com;
    # Redirect HTTP -> HTTPS (Certbot gère ça automatiquement)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name graphiquemotion.com www.graphiquemotion.com;

    # Certbot SSL (généré par : certbot --nginx -d graphiquemotion.com -d www.graphiquemotion.com)
    ssl_certificate     /etc/letsencrypt/live/graphiquemotion.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/graphiquemotion.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Dossier du build React (dist/)
    root  /var/www/graphiquemotion/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Cache statiques (JS/CSS/images)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # OAuth proxy -> Node.js port 3001
    location /oauth {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA — toutes les routes renvoient index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sécurité headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
